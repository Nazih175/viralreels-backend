<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ViralReels AI Branding Kit</title>
    <style>
        body { background: #0a0a0f; color: white; family: 'Inter', sans-serif; text-align: center; padding: 50px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 30px; margin-top: 50px; }
        .card { background: #1a1a24; padding: 20px; border-radius: 15px; border: 1px solid #2a2a35; }
        img, svg { max-width: 150px; margin-bottom: 15px; }
        .btn { display: inline-block; padding: 10px 20px; background: #a855f7; color: white; text-decoration: none; border-radius: 8px; margin-top: 10px; }
        h1 { font-family: 'Outfit', sans-serif; background: linear-gradient(90deg, #a855f7, #ec4899, #eab308); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 3rem; }
    </style>
</head>
<body>
    <h1>ViralReels AI Branding Kit</h1>
    <p>Right-click any image below and select <strong>"Save Image As..."</strong> to download.</p>

    <div class="grid">
        <div class="card">
            <h3>Official SVG Logo</h3>
            <img src="assets/logo.svg" alt="Logo SVG">
            <p>Scalable Vector - Best for Web & Apps</p>
        </div>
        <div class="card">
            <h3>Favicon / App Icon</h3>
            <img src="assets/favicon.png" alt="Favicon PNG">
            <p>192x192 PNG - Best for Google Console</p>
        </div>
        <div class="card">
            <h3>iOS Touch Icon</h3>
            <img src="assets/apple-touch-icon.png" alt="Apple Touch Icon">
            <p>High Resolution - Professional Login Branding</p>
        </div>
    </div>
</body>
</html>
